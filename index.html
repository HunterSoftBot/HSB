<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hunter Soft Bot</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#4DA6FF;
  --bg:#0f0f0f;
  --card:#1c1c1c;
  --text:#ffffff;
}

body.light{
  --bg:#f5f7fa;
  --card:#ffffff;
  --text:#111111;
}

body{
  margin:0;
  font-family:Poppins;
  background:var(--bg);
  color:var(--text);
  transition:.3s;
}

/* TOGGLE */
.themeSwitch{
  position:fixed;
  top:20px;
  left:20px;
  width:65px;
  height:32px;
  background:var(--card);
  border-radius:50px;
  padding:4px;
  cursor:pointer;
  display:flex;
  align-items:center;
}

.switchCircle{
  width:24px;
  height:24px;
  background:var(--primary);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  transition:.3s;
}

body.light .switchCircle{
  transform:translateX(33px);
}

/* PROMO BUTTON */
#promoButton{
  position:fixed;
  top:20px;
  right:20px;
  background:var(--primary);
  color:white;
  padding:8px 16px;
  border-radius:20px;
  cursor:pointer;
}

/* HEADER */
header{
  text-align:center;
  padding:90px 20px 20px;
}

/* NAV */
.mainButtons{
  text-align:center;
  margin-top:20px;
}

.mainButtons a{
  display:inline-block;
  margin:10px;
  padding:12px 25px;
  background:var(--primary);
  color:white;
  border-radius:10px;
  text-decoration:none;
  font-weight:600;
}

/* CONTACT FORM */
.contactForm{
  max-width:600px;
  margin:40px auto;
  padding:20px;
  background:var(--card);
  border-radius:12px;
  position:relative;
}

.contactForm:before{
  content:"";
  position:absolute;
  left:0;
  top:0;
  width:6px;
  height:100%;
  background:var(--primary);
  border-radius:12px 0 0 12px;
}

.contactForm h3{
  margin-top:0;
}

.contactForm input,
.contactForm textarea{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:6px;
  border:1px solid #333;
  background:transparent;
  color:var(--text);
}

.contactForm button{
  background:var(--primary);
  border:none;
  padding:10px;
  border-radius:8px;
  color:white;
  cursor:pointer;
  width:100%;
}

.loadingText{
  text-align:center;
  margin-top:10px;
  display:none;
}

/* PROMO POPUP */
#promoOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  justify-content:center;
  align-items:center;
}

#promoBox{
  background:var(--card);
  width:350px;
  border-radius:12px;
  padding:20px;
  position:relative;
}

#promoClose{
  position:absolute;
  top:10px;
  left:10px;
  cursor:pointer;
}

footer{
  text-align:center;
  padding:30px;
  opacity:.6;
}
</style>
</head>

<body>

<div class="themeSwitch" onclick="toggleTheme()">
  <div class="switchCircle" id="switchIcon">🌙</div>
</div>

<div id="promoButton" onclick="openPromo()">🎁 Promo</div>

<header>
  <h1>Hunter Soft Bot</h1>
  <p>Layanan Bot WhatsApp & Telegram</p>
</header>

<div class="mainButtons">
  <a href="/store">🛒 Store</a>
  <a href="/tools">🛠 Tools</a>
</div>

<!-- CONTACT FORM -->
<div class="contactForm">
  <h3>SEND MESSAGE</h3>
  <input type="text" id="name" placeholder="USERNAME">
  <input type="text" id="phone" placeholder="WA NUMBER">
  <textarea id="message" rows="4" placeholder="MESSAGE"></textarea>
  <button onclick="sendMessage()">Send Message</button>
  <div class="loadingText" id="loadingText">Mengirim pesan...</div>
</div>

<!-- PROMO POPUP -->
<div id="promoOverlay">
  <div id="promoBox">
    <div id="promoClose" onclick="closePromo()">✖</div>
    <h3>Promo Aktif</h3>
    <p>Diskon 10% Paket Premium</p>
  </div>
</div>

<footer>
Hunter Soft Bot © 2026
</footer>

<script>
function toggleTheme(){
  document.body.classList.toggle("light");
  const icon=document.getElementById("switchIcon");

  if(document.body.classList.contains("light")){
    icon.innerHTML="☀️";
    localStorage.setItem("theme","light");
  }else{
    icon.innerHTML="🌙";
    localStorage.setItem("theme","dark");
  }
}

if(localStorage.getItem("theme")==="light"){
  document.body.classList.add("light");
  document.getElementById("switchIcon").innerHTML="☀️";
}

function openPromo(){
  document.getElementById("promoOverlay").style.display="flex";
}

function closePromo(){
  document.getElementById("promoOverlay").style.display="none";
}

async function sendMessage(){
  const name=document.getElementById("name").value;
  const phone=document.getElementById("phone").value;
  const message=document.getElementById("message").value;
  const loading=document.getElementById("loadingText");

  if(!name || !phone || !message){
    alert("Isi semua field dulu!");
    return;
  }

  loading.style.display="block";

  const res=await fetch("/api/send",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name,phone,message})
  });

  const data=await res.json();
  loading.style.display="none";

  if(data.success){
    alert("Pesan berhasil dikirim!");
  }else{
    alert("Gagal mengirim pesan!");
  }
}
</script>

</body>
</html>
