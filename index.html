<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hunter Soft Bot</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #4DA6FF;
  --bg: #0f0f0f;
  --card: #1c1c1c;
  --text: #ffffff;
}

body.light {
  --bg: #f5f7fa;
  --card: #ffffff;
  --text: #111111;
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

/* THEME SWITCH (KANAN) */
#themeToggle {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 60px;
  height: 30px;
  background: var(--card);
  border-radius: 20px;
  padding: 3px;
  cursor: pointer;
  display: flex;
  align-items: center;
  z-index: 999;
}

#themeToggle .circle {
  width: 24px;
  height: 24px;
  background: var(--primary);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  transition: 0.3s;
}

body.light #themeToggle .circle {
  transform: translateX(30px);
}

/* PROMO BUTTON (KIRI) */
#promoButton {
  position: fixed;
  top: 20px;
  left: 20px;
  background: var(--primary);
  color: white;
  padding: 8px 14px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 14px;
  z-index: 999;
}

/* HEADER */
header {
  text-align: center;
  padding: 80px 20px 30px;
}

/* CARD STYLE (SEMUA SAMA) */
.card {
  background: var(--card);
  margin: 20px auto;
  padding: 25px;
  border-radius: 12px;
  max-width: 500px;
  position: relative;
}

.card:before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  height: 100%;
  width: 6px;
  background: var(--primary);
  border-radius: 12px 0 0 12px;
}

.card h2 {
  margin-top: 0;
}

/* BUTTON STYLE SAMA */
.cardBtn {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: var(--primary);
  color: white;
  font-weight: bold;
  cursor: pointer;
  text-align: center;
  display: block;
  text-decoration: none;
  margin-top: 10px;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  background: transparent;
  border: 1px solid #333;
  border-radius: 6px;
  color: var(--text);
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: var(--primary);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

#status {
  margin-top: 10px;
  font-size: 14px;
}

/* PROMO OVERLAY */
#promoOverlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

#promoBox {
  background: var(--card);
  width: 350px;
  border-radius: 12px;
  padding: 20px;
  position: relative;
}

#promoClose {
  position: absolute;
  top: 10px;
  left: 10px;
  cursor: pointer;
}

footer {
  text-align: center;
  padding: 30px;
  opacity: 0.6;
  font-size: 13px;
}
</style>
</head>

<body>

<div id="promoButton">🎁 Promo</div>

<div id="themeToggle">
  <div class="circle" id="themeIcon">🌙</div>
</div>

<header>
  <h1>Hunter Soft Bot</h1>
  <p>Layanan Bot WhatsApp & Telegram</p>
</header>

<!-- STORE (SAMA STYLE DENGAN CONTACT) -->
<div class="card">
  <h2>Store</h2>
  <p>Lihat daftar paket dan harga terbaru Hunter Soft Bot.</p>
  <a href="/store" class="cardBtn">Buka Store</a>
</div>

<!-- TOOLS (SAMA STYLE DENGAN CONTACT) -->
<div class="card">
  <h2>Tools</h2>
  <p>Gunakan berbagai tools seperti TikTok Downloader.</p>
  <a href="/tools" class="cardBtn">Buka Tools</a>
</div>

<!-- CONTACT -->
<div class="card">
  <h2>Contact Owner</h2>
  <input type="text" id="name" placeholder="Username">
  <input type="text" id="phone" placeholder="WA Number">
  <textarea id="message" rows="4" placeholder="Message"></textarea>
  <button id="send">Send Message</button>
  <p id="status"></p>
</div>

<footer>
Powered by Vercel • GitHub Ready
</footer>

<script>
const toggle = document.getElementById("themeToggle");
const icon = document.getElementById("themeIcon");

if (localStorage.getItem("theme") === "light") {
  document.body.classList.add("light");
  icon.innerText = "☀️";
}

toggle.addEventListener("click", () => {
  document.body.classList.toggle("light");

  if (document.body.classList.contains("light")) {
    localStorage.setItem("theme", "light");
    icon.innerText = "☀️";
  } else {
    localStorage.setItem("theme", "dark");
    icon.innerText = "🌙";
  }
});
</script>

</body>
</html>
