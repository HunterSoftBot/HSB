
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Store</title>
<link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div id="menuBtn">☰</div>

<div id="sidebar">
<a href="/">Menu Utama</a>
<a href="/store">Store</a>
<a href="/tools">Tools</a>
<a href="https://wa.me/">WhatsApp</a>
<a href="https://t.me/">Telegram</a>
</div>

<div id="sidebarOverlay"></div>

<div id="promoButton">Promo</div>

<div id="themeToggle"><div class="circle"></div></div>

<div id="cartBadge">0</div>

<header>
<h1>Hunter Store</h1>
</header>

<div class="card">

<h3>Paket Bot</h3>
<p>Rp 100000</p>

<div class="qtyBox">
<button onclick="qty--">-</button>
<span id="qty">1</span>
<button onclick="qty++">+</button>
</div>

<button onclick="addItem('Paket Bot',100000,1)">Tambah ke Keranjang</button>

</div>

<div class="card">

<h3>Keranjang</h3>

<div id="cartList"></div>

<p>Total: Rp <span id="total">0</span></p>

<button onclick="checkout()">Checkout WhatsApp</button>
<button onclick="clearCart()">Hapus Semua</button>

</div>

<script src="/js/sidebar.js"></script>
<script src="/js/theme.js"></script>
<script src="/js/promo.js"></script>
<script src="/js/store.js"></script>

</body>
</html>
